apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 1 # Specifies that three instances (pods) of NGINX should be running
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.26.1 # Uses the NGINX 1.26.1 image from Docker Hub
        ports:
        - containerPort: 80 # Exposes port 80 within the container
