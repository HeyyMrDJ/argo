apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoringstack
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 55.5.0
      helm:
        valueFiles:
          - $values/environments/homelab/prometheusgrafanastack/values.yaml
    - repoURL: https://github.com/HeyyMrDJ/argo
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
