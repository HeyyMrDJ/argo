---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-test
  labels:
    app: metrics-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-test
  template:
    metadata:
      labels:
        app: metrics-test
    spec:
      containers:
      - name: metrics-test
        image: quay.io/brancz/prometheus-example-app:v0.3.0
        ports:
        - name: http
          containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-test
  labels:
    app: metrics-test
spec:
  selector:
    app: metrics-test
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: metrics-test-monitor
  labels:
    team: demo
    app.kubernetes.io/instance: test-kube-prometheus-stack-prometheus
    app.kubernetes.io/managed-by: prometheus-operator
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: test-kube-prometheus-stack-prometheus
    prometheus: test-kube-prometheus-stack-prometheus
    release: test
spec:
  namespaceSelector:
    matchNames:
    - demo
  selector:
    matchLabels:
      app: metrics-test
  endpoints:
    - port: http
      interval: 15s
